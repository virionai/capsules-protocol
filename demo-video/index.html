<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Capsule v0.6 launch demo — Kaggle Gemma 4 Good Hackathon</title>
  <meta name="viewport" content="width=1920, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      color: #f5f5f5;
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="capsule-demo"
       data-composition-id="capsule-demo"
       data-width="1920"
       data-height="1080"
       data-start="0"
       data-duration="180">

    <!-- Scene 1: Cold open (0-10s) — ⚡ -->
    <div id="s1"
         data-composition-id="scene-1-cold-open"
         data-composition-src="compositions/scene-1-cold-open.html"
         data-start="0"
         data-duration="10"
         data-track-index="0"></div>

    <!-- Scene 2: The Ask (10-30s) — ⚡ -->
    <div id="s2"
         data-composition-id="scene-2-the-ask"
         data-composition-src="compositions/scene-2-the-ask.html"
         data-start="10"
         data-duration="20"
         data-track-index="0"></div>

    <!-- Scene 3: Trust install (30-55s) -->
    <div id="s3"
         data-composition-id="scene-3-trust-install"
         data-composition-src="compositions/scene-3-trust-install.html"
         data-start="30"
         data-duration="25"
         data-track-index="0"></div>

    <!-- Scene 4: Gemma 4 probes (55-85s) — HEADLINE -->
    <div id="s4"
         data-composition-id="scene-4-gemma-probes"
         data-composition-src="compositions/scene-4-gemma-probes.html"
         data-start="55"
         data-duration="30"
         data-track-index="0"></div>

    <!-- Scene 5: Seal & transport (85-115s) — ⚡ -->
    <div id="s5"
         data-composition-id="scene-5-seal-transport"
         data-composition-src="compositions/scene-5-seal-transport.html"
         data-start="85"
         data-duration="30"
         data-track-index="0"></div>

    <!-- Scene 6: Clinician side (115-150s) -->
    <div id="s6"
         data-composition-id="scene-6-clinician"
         data-composition-src="compositions/scene-6-clinician.html"
         data-start="115"
         data-duration="35"
         data-track-index="0"></div>

    <!-- Scene 7: Format moat (150-170s) — ⚡ -->
    <div id="s7"
         data-composition-id="scene-7-format-moat"
         data-composition-src="compositions/scene-7-format-moat.html"
         data-start="150"
         data-duration="20"
         data-track-index="0"></div>

    <!-- Scene 8: Close (170-180s) -->
    <div id="s8"
         data-composition-id="scene-8-close"
         data-composition-src="compositions/scene-8-close.html"
         data-start="170"
         data-duration="10"
         data-track-index="0"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      window.__timelines["capsule-demo"] = tl;
    </script>
  </div>
</body>
</html>
