      tl.set("#cap-1", { opacity: 0 }, 5.3);

      // Cut to phase B

      tl.from(".airplane", { scale: 0, rotation: -20, opacity: 0, duration: 0.5, ease: "back.out(2)" }, 6.4);

      // App content stagger
      tl.from(".app-name", { y: 10, opacity: 0, duration: 0.35, ease: "power2.out" }, 6.6);
      tl.from(".app-subhead", { y: 16, opacity: 0, duration: 0.45, ease: "power3.out" }, 6.7);
      tl.from('[data-composition-id="scene-2-the-ask"] .skill-row', { y: 14, opacity: 0, duration: 0.4, ease: "power2.out", stagger: 0.1 }, 6.9);

      // Airplane chyron appears

      tl.set(".airplane-chyron", { opacity: 1 }, 8.0);

      // Caption 2

      tl.set("#cap-2", { opacity: 1 }, 6.4);
      tl.set("#cap-2", { opacity: 0 }, 9.5);

      // Caption 3
      tl.from("#cap-3", { y: 14, opacity: 0, duration: 0.4, ease: "power2.out" }, 9.6);
      tl.set("#cap-3", { opacity: 1 }, 10.0);
      tl.set("#cap-3", { opacity: 0 }, 13.3);

      // Cut to phase C
      tl.set(".phase-b", { opacity: 0 }, 13.5);

      // ============ PHASE C: Paper card (13.5 - 20.0s) ============
      tl.set(".phase-c", { opacity: 1 }, 13.5);
      tl.from(".paper-card", { y: 50, opacity: 0, rotation: -8, scale: 0.92, duration: 0.8, ease: "power3.out" }, 13.55);
      tl.from(".card-eyebrow", { y: 12, opacity: 0, duration: 0.4, ease: "power2.out" }, 13.95);
      tl.from(".card-rule", { scaleX: 0, opacity: 0, duration: 0.45, ease: "expo.out", transformOrigin: "left center" }, 14.15);
      tl.from(".card-url", { y: 30, opacity: 0, duration: 0.7, ease: "power3.out" }, 14.3);
      tl.from(".card-clinic", { y: 16, opacity: 0, duration: 0.5, ease: "power2.out" }, 14.6);
      tl.from(".card-foot", { y: 12, opacity: 0, duration: 0.4, ease: "power2.out" }, 14.85);

      // Caption 4
      tl.from("#cap-4", { y: 14, opacity: 0, duration: 0.4, ease: "power2.out" }, 13.8);
