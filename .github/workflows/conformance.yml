name: Conformance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 13:07 UTC daily. Off-the-hour to avoid GitHub's cron stampede.
    - cron: "7 13 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  conformance:
    name: Run conformance harness
    runs-on: ubuntu-latest
    # This job needs write access to push the regenerated report back to
    # main via the auto-commit step below.
    permissions:
      contents: write
    timeout-minutes: 20
    # Pin every `run:` step to bash so PIPESTATUS et al. behave the same
    # regardless of any future runner-image default-shell change.
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Need full history for the auto-commit step to push back.
          fetch-depth: 0
          # Use the default token; auto-commit step will push with it.
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          # No package.json at repo root; the harness installs each
          # target's dependencies itself. No cache to mismanage.

      - name: Run conformance harness
        id: harness
        # The harness exits 0 on all-pass, 1 on any failure. We let it
        # run to completion via `continue-on-error: true` so subsequent
        # steps (upload artifact, commit report) still run. The final
        # "Fail job on FAIL" step re-asserts the exit code so the
        # workflow status reflects what the harness reported.
        run: |
          set -o pipefail
          mkdir -p output
          # `set -e` (GitHub's default) would abort this step the instant the
          # `node ... | tee` pipeline fails under pipefail — i.e. exactly when
          # the harness reports FAIL — before HARNESS_EXIT is written. An unset
          # HARNESS_EXIT is then coerced to 0 by the fail gate below, so a red
          # harness would report green. Disable errexit around the pipeline so
          # we always capture and record the real exit code.
          set +e
          node tools/run-conformance.mjs | tee output/harness.log
          harness_exit=${PIPESTATUS[0]}
          set -e
          echo "HARNESS_EXIT=${harness_exit}" >> "$GITHUB_ENV"
        continue-on-error: true

      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: conformance-report
          path: |
            output/conformance-report.json
            output/conformance-report.md
            output/harness.log
          if-no-files-found: warn
          retention-days: 30

      - name: Commit report back to main
        # Only on push-to-main. PRs cannot push to main; scheduled runs
        # currently skip the commit step too (flip the `if:` if we want
        # nightly autocommits later).
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9  # v7.1.0
        with:
          commit_message: "ci: refresh output/conformance-report.md"
          # Only commit the two report files; harness.log etc. stays
          # out of history.
          file_pattern: "output/conformance-report.json output/conformance-report.md"
          skip_dirty_check: false
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"

      - name: Fail job on harness FAIL
        if: env.HARNESS_EXIT != '0'
        run: |
          echo "Conformance harness exited ${HARNESS_EXIT}."
          exit "${HARNESS_EXIT}"

  conformance-python:
    name: Python parity (sdk-py)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js
        # The Python parity suite shells out to the JS SDK for the
        # reverse-direction (Python-built, JS-verified) tests.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install sdk-py and run pytest
        run: |
          pip install -e "sdk-py[dev]"
          python -m pytest sdk-py/tests/ -v --tb=short

  conformance-rust:
    name: Rust parity (verifier-rust)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cargo test --workspace
        working-directory: verifier-rust
        run: cargo test --workspace

  conformance-summary:
    name: Conformance summary
    runs-on: ubuntu-latest
    # Gate the overall conformance signal on all three in-CI SDK lanes:
    # JS (harness), Python (sdk-py), and Rust (verifier-rust).
    needs: [conformance, conformance-python, conformance-rust]
    if: always()
    steps:
      - name: Assert all lanes passed
        run: |
          echo "JS harness:    ${{ needs.conformance.result }}"
          echo "Python parity: ${{ needs.conformance-python.result }}"
          echo "Rust parity:   ${{ needs.conformance-rust.result }}"
          if [ "${{ needs.conformance.result }}" != "success" ] \
            || [ "${{ needs.conformance-python.result }}" != "success" ] \
            || [ "${{ needs.conformance-rust.result }}" != "success" ]; then
            echo "One or more conformance lanes failed."
            exit 1
          fi
          echo "All conformance lanes passed (JS + Python + Rust)."
